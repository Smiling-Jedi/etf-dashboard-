        }

        .nav-links {

        .nav-link-top {

        .title-actions {

        .btn-outline {

            text-decoration: none;

            padding-left: 12px;

            border-bottom: 1px solid #e0e3eb;
        }

        .report-header h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            border: none;
            padding: 0;
        }

        .report-meta {
            font-size: 14px;
            color: #787b86;
            line-height: 1.8;
        }

        /* 章节标题 - 左侧竖线区隔 */
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 32px 0 16px 0;
            padding-left: 12px;
            border-left: 4px solid #131722;
            line-height: 1.4;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 24px 0 12px 0;
            color: #333;
        }

        p {
            margin-bottom: 12px;
        }

        ul, ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        li {
            margin-bottom: 8px;
        }

        /* 表格 - 极简 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin: 16px 0;
        }

        th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #e0e3eb;
            font-weight: 500;
            color: #787b86;
            font-size: 13px;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f3fa;
        }

        tr:last-child td {
            border-bottom: 1px solid #e0e3eb;
        }

        /* 折叠组件 */
        details {
            margin: 16px 0;
        }

        summary {
            cursor: pointer;
            color: #2962ff;
            font-size: 14px;
            user-select: none;
            list-style: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::before {
            content: "▶";
            display: inline-block;
            margin-right: 6px;
            font-size: 10px;
            transition: transform 0.2s;
        }

        details[open] summary::before {
            transform: rotate(90deg);
        }

        details[open] summary {
            margin-bottom: 12px;
        }

        /* 优先级标签 */
        .tag {
            display: inline-block;
            padding: 2px 6px;
            background: #f5f6f7;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
            color: #495057;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 0 12px;
            }

            .header-inner {
                padding: 0 16px;
            }

            .main-layout {
                flex-direction: column;
                gap: 16px;
            }

            .sidebar {
                width: 100%;
                order: -1;
            }

            .sidebar-card {
                margin-bottom: 12px;
            }

            .content-wrapper {
                padding: 20px;
            }

            .report-header h2 {
                font-size: 22px;
            }

            h2 {
                font-size: 17px;
            }

            table {
                font-size: 13px;
            }

            .header-title-area {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .title-actions {
                width: 100%;
            }
        }
